<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FRIDGENIX - Checkout Premium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-image: radial-gradient(circle at top right, #1e3a8a, #0f172a); }
    </style>
</head>
<body class="text-white min-h-screen flex items-center justify-center p-4">

    <div class="bg-slate-800/80 backdrop-blur-md p-8 sm:p-10 rounded-3xl shadow-2xl max-w-md w-full border border-slate-700 text-center relative overflow-hidden">
        <!-- Decoración de fondo -->
        <div class="absolute -top-24 -left-24 w-48 h-48 bg-blue-500 rounded-full mix-blend-multiply filter blur-3xl opacity-50"></div>
        <div class="absolute -bottom-24 -right-24 w-48 h-48 bg-indigo-500 rounded-full mix-blend-multiply filter blur-3xl opacity-50"></div>

        <div class="relative z-10">
            <div class="text-6xl mb-6 text-yellow-400 drop-shadow-lg"><i class="fa-solid fa-crown"></i></div>
            <h1 class="text-3xl font-extrabold mb-2 tracking-tight">FRIDGENIX Premium</h1>
            <p class="text-slate-300 mb-8 font-medium">Estás a un paso de ahorrar hasta 50€ al mes en tu hogar, reduciendo el desperdicio al máximo.</p>
            
            <div class="bg-slate-900/50 p-6 rounded-2xl mb-8 border border-slate-600 text-left backdrop-blur-sm">
                <div class="flex justify-between items-center mb-3">
                    <span class="text-slate-300 font-medium">Suscripción Mensual</span>
                    <span class="font-bold text-lg">2,99 €</span>
                </div>
                <div class="flex justify-between items-center text-sm text-slate-400 mb-4">
                    <span>Impuestos incluidos (IVA)</span>
                    <span>0,00 €</span>
                </div>
                <div class="w-full h-px bg-slate-600 mb-4"></div>
                <div class="flex justify-between items-end text-2xl font-black text-blue-400">
                    <span class="text-base font-bold text-white mb-1">Total a pagar hoy</span>
                    <span>2,99 €</span>
                </div>
            </div>

            <button onclick="alert('💳 ¡Simulación de pago completada con éxito! Ya disfrutas de todas las ventajas Premium.'); window.location.href='index.html';" class="w-full bg-gradient-to-r from-blue-500 to-indigo-600 text-white font-bold py-4 rounded-xl hover:scale-105 transition-transform duration-300 mb-6 shadow-lg shadow-blue-500/30 flex justify-center items-center gap-3 text-lg">
                <i class="fa-solid fa-lock text-sm opacity-80"></i> Pagar y Activar Premium
            </button>
            
            <a href="index.html" class="text-slate-400 hover:text-white underline text-sm transition-colors">Cancelar y volver de forma segura al inicio</a>
        </div>
    </div>

</body>
</html>
