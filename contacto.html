<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>FRIDGENIX - Contacto</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen flex flex-col">

    <header class="bg-white border-b border-slate-200 sticky top-0 z-50">
        <div class="container mx-auto px-4 h-20 flex items-center justify-between">
            <a href="index.html" class="flex items-center gap-2">
                <img src="logo.png" class="h-10 w-auto"><span class="text-2xl font-black text-blue-600">FRIDGENIX</span>
            </a>
        </div>
    </header>

    <nav class="bg-blue-600 text-white shadow-md">
        <ul class="container mx-auto px-4 py-3 flex space-x-8 overflow-x-auto">
            <li><a href="index.html">Inicio</a></li><li><a href="inventario.html">Inventario</a></li>
            <li><a href="recetas.html">Recetas</a></li><li><a href="listas.html">Listas</a></li>
            <li><a href="estadisticas.html">Estadísticas</a></li>
            <li><a href="contacto.html" class="font-bold border-b-2">Contacto</a></li>
        </ul>
    </nav>

    <main class="container mx-auto px-4 py-8 flex-grow">
        <h1 class="text-3xl font-extrabold mb-8 text-center">Contacta con Nosotros</h1>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-8 max-w-5xl mx-auto">
            <div class="bg-white p-8 rounded-2xl shadow">
                <h3 class="font-bold text-xl mb-6 flex items-center gap-2"><i class="fa-solid fa-paper-plane text-blue-500"></i> Envíanos tu consulta</h3>
                <form onsubmit="event.preventDefault(); alert('✅ Consulta enviada con éxito. Te responderemos en 24h.');">
                    <input type="text" placeholder="Nombre" class="w-full mb-4 bg-slate-50 border p-3 rounded-lg" required>
                    <input type="email" placeholder="Email" class="w-full mb-4 bg-slate-50 border p-3 rounded-lg" required>
                    <textarea placeholder="Escribe tu duda o sugerencia..." rows="5" class="w-full mb-4 bg-slate-50 border p-3 rounded-lg" required></textarea>
                    <button class="w-full bg-blue-600 text-white py-3 rounded-lg font-bold hover:bg-blue-700 transition">Enviar</button>
                </form>
            </div>
            <div class="bg-slate-900 text-white p-8 rounded-2xl shadow flex flex-col">
                <h3 class="font-bold text-xl mb-4">📍 Nuestras Oficinas</h3>
                <p class="mb-2"><i class="fa-solid fa-location-dot mr-2 text-blue-400"></i> Av. Innovación 45, Córdoba, España</p>
                <p class="mb-4"><i class="fa-solid fa-phone mr-2 text-blue-400"></i> 957 123 456</p>
                <!-- MAPA DE CÓRDOBA -->
                <div class="w-full h-64 rounded-xl overflow-hidden border border-slate-700 mt-auto">
                    <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d100784.814324831!2d-4.860166417711204!3d37.89155556209506!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0xd6d39fda0a09e09%3A0xe5a36db5ed94ea8f!2zQ8OzcmRvYmE!5e0!3m2!1ses!2ses!4v1714850000000!5m2!1ses!2ses" width="100%" height="100%" style="border:0;" allowfullscreen="" loading="lazy" title="Mapa de Córdoba"></iframe>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
