<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FRIDGENIX - Contacto</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen flex flex-col">

    <header class="bg-white border-b border-slate-200 sticky top-0 z-50">
        <div class="container mx-auto px-4 h-20 flex items-center justify-between">
            <a href="index.html" class="flex items-center gap-2"><span class="text-4xl">🧊</span><span class="text-2xl font-black text-blue-600">FRIDGENIX</span></a>
        </div>
    </header>

    <nav class="bg-blue-600 text-white sticky top-20 z-40 shadow-md">
        <div class="container mx-auto px-4 overflow-x-auto">
            <ul class="flex items-center space-x-8 py-3 whitespace-nowrap">
                <li><a href="index.html" class="hover:text-blue-200">Inicio</a></li>
                <li><a href="inventario.html" class="hover:text-blue-200">Mi Inventario</a></li>
                <li><a href="contacto.html" class="hover:text-blue-200 font-semibold border-b-2 border-white pb-1">Contacto</a></li>
            </ul>
        </div>
    </nav>

    <main class="container mx-auto px-4 py-8 flex-grow">
        <h1 class="text-3xl font-extrabold text-slate-800 mb-8">Soporte y Contacto</h1>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <!-- Formulario de Contacto -->
            <div class="bg-white p-6 rounded-2xl shadow-sm">
                <h3 class="font-bold text-xl mb-4">Envíanos tu consulta</h3>
                <form onsubmit="event.preventDefault(); alert('¡Mensaje enviado al equipo de soporte!');">
                    <input type="text" placeholder="Tu nombre" required class="w-full mb-4 bg-slate-50 border border-slate-200 rounded-lg py-2 px-3">
                    <textarea placeholder="¿En qué podemos ayudarte?" required rows="4" class="w-full mb-4 bg-slate-50 border border-slate-200 rounded-lg py-2 px-3"></textarea>
                    <button type="submit" class="bg-blue-600 text-white px-6 py-2 rounded-lg font-bold">Enviar Mensaje</button>
                </form>
            </div>
            <!-- Información y Mapa -->
            <div class="bg-slate-900 text-white p-6 rounded-2xl shadow-sm text-center flex flex-col justify-center">
                <i class="fa-solid fa-location-dot text-4xl text-blue-500 mb-4"></i>
                <h3 class="font-bold text-xl mb-2">Sede Principal</h3>
                <p class="text-slate-400 mb-4">Av. de la Innovación 45, Córdoba<br>Teléfono: 900 123 456</p>
                <div class="w-full h-40 bg-slate-800 rounded-lg flex items-center justify-center border border-slate-700">
                    <span class="text-slate-500">[Mapa de Localización Simulado aquí]</span>
                </div>
            </div>
        </div>
    </main>

</body>
</html>
