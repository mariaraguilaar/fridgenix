<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FRIDGENIX - Registro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        #mobile-menu { max-height: 0; overflow: hidden; transition: max-height 0.35s ease; }
        #mobile-menu.open { max-height: 500px; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen flex flex-col">

    <header class="bg-white border-b border-slate-200 sticky top-0 z-50">
        <div class="px-4 h-16 flex items-center justify-between">
            <a href="index.html" class="flex items-center gap-2">
                <img src="logo.png" alt="Logo Fridgenix" class="h-8 w-auto">
                <span class="text-xl font-black tracking-tighter text-blue-600">FRIDGENIX</span>
            </a>
            <a href="index.html" class="text-slate-500 text-sm font-medium min-h-[48px] flex items-center">
                <i class="fa-solid fa-arrow-left mr-1"></i> Inicio
            </a>
        </div>
    </header>

    <!--
        DECISIÓN DE USABILIDAD:
        El formulario de registro en móvil ocupa toda la pantalla sin el max-w-md centrado.
        Los campos y botones tienen altura mínima de 48-52px (ergonomía táctil).
        La barra de progreso se mantiene, es muy útil en móvil para que el usuario sepa
        cuánto le falta. Los checkboxes de intolerancias pasan a 2 columnas (ya lo tenía).
    -->
    <main class="px-4 py-6 flex-grow">
        <div class="bg-white rounded-2xl shadow-lg overflow-hidden relative">

            <!-- Barra de progreso -->
            <div class="w-full bg-slate-200 h-2">
                <div id="progress-bar" class="bg-blue-600 h-2 rounded-r-full transition-all duration-500 w-1/2"></div>
            </div>

            <!-- PASO 1 -->
            <div id="paso-1" class="p-5 mt-1">
                <h1 class="text-xl font-bold text-center mb-1">Crea tu cuenta</h1>
                <p class="text-center text-slate-500 text-sm mb-5">Paso 1 de 2 · Datos personales</p>

                <form onsubmit="event.preventDefault(); irAlPaso2();">
                    <div class="mb-4">
                        <label class="block text-slate-600 text-sm font-bold mb-1.5">Nombre Completo</label>
                        <input type="text" required placeholder="Ej: Carlos Pérez"
                            class="w-full bg-slate-50 border border-slate-200 rounded-xl py-3.5 px-4 text-base focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-200">
                    </div>
                    <div class="mb-4">
                        <label class="block text-slate-600 text-sm font-bold mb-1.5">Correo Electrónico</label>
                        <input type="email" required placeholder="carlos@email.com"
                            class="w-full bg-slate-50 border border-slate-200 rounded-xl py-3.5 px-4 text-base focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-200">
                    </div>
                    <div class="mb-6">
                        <label class="block text-slate-600 text-sm font-bold mb-1.5">Contraseña</label>
                        <input type="password" required placeholder="••••••••"
                            class="w-full bg-slate-50 border border-slate-200 rounded-xl py-3.5 px-4 text-base focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-200">
                    </div>
                    <button type="submit"
                        class="w-full bg-blue-600 text-white font-bold py-4 rounded-xl hover:bg-blue-700 transition text-base min-h-[52px]">
                        Siguiente paso <i class="fa-solid fa-arrow-right ml-2"></i>
                    </button>
                </form>
            </div>

            <!-- PASO 2 -->
            <div id="paso-2" class="hidden p-5 mt-1">
                <button onclick="volverAlPaso1()" class="text-slate-400 hover:text-blue-600 mb-4 text-sm font-medium flex items-center gap-1 min-h-[40px]">
                    <i class="fa-solid fa-arrow-left"></i> Volver
                </button>
                <h1 class="text-xl font-bold text-center mb-1">Configura tu hogar</h1>
                <p class="text-center text-slate-500 text-sm mb-5">Paso 2 de 2 · Familia e Inventario</p>

                <div class="flex gap-2 mb-5 p-1 bg-slate-100 rounded-xl">
                    <button id="btn-crear" onclick="cambiarModo('crear')"
                        class="flex-1 py-2.5 text-sm font-bold bg-white text-blue-600 rounded-lg shadow-sm transition min-h-[44px]">
                        Crear familia
                    </button>
                    <button id="btn-unirse" onclick="cambiarModo('unirse')"
                        class="flex-1 py-2.5 text-sm font-bold text-slate-500 transition min-h-[44px]">
                        Unirse a familia
                    </button>
                </div>

                <form onsubmit="event.preventDefault(); finalizarRegistro();">
                    <div id="form-crear" class="block">
                        <div class="mb-4">
                            <label class="block text-slate-600 text-sm font-bold mb-1.5">Nombre del Hogar</label>
                            <input type="text" id="nombre-familia" placeholder="Ej: Familia Pérez"
                                class="w-full bg-slate-50 border border-slate-200 rounded-xl py-3.5 px-4 text-base focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-200">
                        </div>
                        <div class="mb-6">
                            <label class="block text-slate-600 text-sm font-bold mb-2">¿Alguna intolerancia en casa?</label>
                            <div class="grid grid-cols-2 gap-2">
                                <label class="flex items-center gap-2 p-3.5 border border-slate-200 rounded-xl cursor-pointer min-h-[48px]">
                                    <input type="checkbox" class="w-5 h-5 text-blue-600 rounded"> <span class="text-sm font-medium">Sin Gluten</span>
                                </label>
                                <label class="flex items-center gap-2 p-3.5 border border-slate-200 rounded-xl cursor-pointer min-h-[48px]">
                                    <input type="checkbox" class="w-5 h-5 text-blue-600 rounded"> <span class="text-sm font-medium">Sin Lactosa</span>
                                </label>
                                <label class="flex items-center gap-2 p-3.5 border border-slate-200 rounded-xl cursor-pointer min-h-[48px]">
                                    <input type="checkbox" class="w-5 h-5 text-blue-600 rounded"> <span class="text-sm font-medium">Vegano</span>
                                </label>
                            </div>
                        </div>
                    </div>

                    <div id="form-unirse" class="hidden">
                        <div class="mb-6">
                            <label class="block text-slate-600 text-sm font-bold mb-1.5">Código de invitación</label>
                            <p class="text-xs text-slate-500 mb-2">Pídele a un miembro de tu familia el código de la nevera.</p>
                            <input type="text" placeholder="Ej: FRIDG-A8F2"
                                class="w-full bg-slate-50 border border-slate-200 rounded-xl py-3.5 px-4 font-mono text-center tracking-widest uppercase text-base focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-200">
                        </div>
                    </div>

                    <button type="submit"
                        class="w-full bg-green-500 text-white font-bold py-4 rounded-xl hover:bg-green-600 transition text-base flex justify-center items-center gap-2 min-h-[52px]">
                        <i class="fa-solid fa-check"></i> Finalizar Registro
                    </button>
                </form>
            </div>
        </div>
    </main>

    <script>
        function toggleMenu() {
            const menu = document.getElementById('mobile-menu');
            const icon = document.querySelector('#btn-hamburguesa i');
            menu.classList.toggle('open');
            icon.classList.toggle('fa-bars');
            icon.classList.toggle('fa-xmark');
        }
        function irAlPaso2() {
            document.getElementById('paso-1').classList.add('hidden');
            document.getElementById('paso-2').classList.remove('hidden');
            document.getElementById('progress-bar').style.width = '100%';
        }
        function volverAlPaso1() {
            document.getElementById('paso-2').classList.add('hidden');
            document.getElementById('paso-1').classList.remove('hidden');
            document.getElementById('progress-bar').style.width = '50%';
        }
        function cambiarModo(modo) {
            let btnCrear = document.getElementById('btn-crear');
            let btnUnirse = document.getElementById('btn-unirse');
            if (modo === 'crear') {
                btnCrear.className = "flex-1 py-2.5 text-sm font-bold bg-white text-blue-600 rounded-lg shadow-sm transition min-h-[44px]";
                btnUnirse.className = "flex-1 py-2.5 text-sm font-bold text-slate-500 transition min-h-[44px]";
                document.getElementById('form-crear').classList.remove('hidden');
                document.getElementById('form-unirse').classList.add('hidden');
            } else {
                btnUnirse.className = "flex-1 py-2.5 text-sm font-bold bg-white text-blue-600 rounded-lg shadow-sm transition min-h-[44px]";
                btnCrear.className = "flex-1 py-2.5 text-sm font-bold text-slate-500 transition min-h-[44px]";
                document.getElementById('form-unirse').classList.remove('hidden');
                document.getElementById('form-crear').classList.add('hidden');
            }
        }
        function finalizarRegistro() {
            let modoCrear = !document.getElementById('form-crear').classList.contains('hidden');
            if (modoCrear) {
                let nomFamilia = document.getElementById('nombre-familia').value || 'Tu Familia';
                let codigo = 'FRIDG-' + Math.random().toString(36).substr(2, 4).toUpperCase();
                alert('¡Hogar "' + nomFamilia + '" creado!\n\n🔑 TU CÓDIGO:\n' + codigo + '\n\nCompártelo con tu familia.');
            } else {
                alert('¡Te has unido al hogar! Sincronizando inventario...');
            }
            window.location.href = 'index.html';
        }
    </script>
<script>/* forzar-reflow */document.addEventListener("DOMContentLoaded",function(){document.body.style.display="none";void document.body.offsetHeight;document.body.style.display="";});</script>
</body>
</html>
