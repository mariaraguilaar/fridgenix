<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FRIDGENIX - Contacto</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        #mobile-menu { max-height: 0; overflow: hidden; transition: max-height 0.35s ease; }
        #mobile-menu.open { max-height: 500px; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen flex flex-col">

    <header class="bg-white border-b border-slate-200 sticky top-0 z-50">
        <div class="px-4 h-16 flex items-center justify-between">
            <a href="index.html" class="flex items-center gap-2">
                <img src="logo.png" class="h-8 w-auto">
                <span class="text-xl font-black tracking-tighter text-blue-600">FRIDGENIX</span>
            </a>
            <button id="btn-hamburguesa" onclick="toggleMenu()" class="text-slate-700 w-10 h-10 flex items-center justify-center rounded-lg hover:bg-slate-100">
                <i class="fa-solid fa-bars text-xl"></i>
            </button>
        </div>
    </header>

    <nav id="mobile-menu" class="bg-blue-600 text-white z-40 shadow-md">
        <ul class="flex flex-col divide-y divide-blue-500">
            <li><a href="index.html" class="px-5 py-3 hover:bg-blue-700 transition flex items-center gap-2 min-h-[48px]">🏠 Inicio</a></li>
            <li><a href="inventario.html" class="px-5 py-3 hover:bg-blue-700 transition flex items-center gap-2 min-h-[48px]">📦 Mi Inventario</a></li>
            <li><a href="recetas.html" class="px-5 py-3 hover:bg-blue-700 transition flex items-center gap-2 min-h-[48px]">🍳 Recetas</a></li>
            <li><a href="listas.html" class="px-5 py-3 hover:bg-blue-700 transition flex items-center gap-2 min-h-[48px]">🛒 Listas de Compra</a></li>
            <li><a href="estadisticas.html" class="px-5 py-3 hover:bg-blue-700 transition flex items-center gap-2 min-h-[48px]">📊 Estadísticas</a></li>
            <li><a href="contacto.html" class="px-5 py-3 bg-blue-700 font-semibold flex items-center gap-2 min-h-[48px]">✉️ Contacto</a></li>
        </ul>
    </nav>

    <main class="px-4 py-6 flex-grow pb-24">
        <h1 class="text-2xl font-extrabold mb-6 text-center">Contacta con Nosotros</h1>

        <!--
            DECISIÓN DE USABILIDAD:
            El original usa grid 2 columnas (formulario | mapa).
            En móvil: columna única, formulario primero (acción principal),
            información de oficinas debajo. El mapa se reduce en altura
            para no ocupar toda la pantalla en dispositivos pequeños.
        -->

        <!-- Formulario -->
        <div class="bg-white p-5 rounded-2xl shadow mb-5">
            <h3 class="font-bold text-base mb-4 flex items-center gap-2">
                <i class="fa-solid fa-paper-plane text-blue-500"></i> Envíanos tu consulta
            </h3>
            <form onsubmit="event.preventDefault(); alert('✅ Consulta enviada. Te responderemos en 24h.');">
                <input type="text" placeholder="Nombre" required
                    class="w-full mb-3 bg-slate-50 border border-slate-200 p-3.5 rounded-xl text-base focus:outline-none focus:ring-2 focus:ring-blue-400">
                <input type="email" placeholder="Email" required
                    class="w-full mb-3 bg-slate-50 border border-slate-200 p-3.5 rounded-xl text-base focus:outline-none focus:ring-2 focus:ring-blue-400">
                <textarea placeholder="Escribe tu duda o sugerencia..." rows="4" required
                    class="w-full mb-4 bg-slate-50 border border-slate-200 p-3.5 rounded-xl text-base focus:outline-none focus:ring-2 focus:ring-blue-400 resize-none"></textarea>
                <!-- Botón táctil con altura generosa -->
                <button type="submit"
                    class="w-full bg-blue-600 text-white py-4 rounded-xl font-bold text-base hover:bg-blue-700 transition min-h-[52px]">
                    Enviar mensaje
                </button>
            </form>
        </div>

        <!-- Info de oficinas -->
        <div class="bg-slate-900 text-white p-5 rounded-2xl shadow">
            <h3 class="font-bold text-base mb-3">📍 Nuestras Oficinas</h3>
            <p class="text-sm mb-1.5">
                <i class="fa-solid fa-location-dot mr-2 text-blue-400"></i>
                Av. Innovación 45, Córdoba, España
            </p>
            <p class="text-sm mb-4">
                <i class="fa-solid fa-phone mr-2 text-blue-400"></i>
                957 123 456
            </p>
            <!-- Mapa: altura reducida en móvil para no monopolizar la pantalla -->
            <div class="w-full h-48 rounded-xl overflow-hidden border border-slate-700">
                <iframe
                    src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d100784.814324831!2d-4.860166417711204!3d37.89155556209506!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0xd6d39fda0a09e09%3A0xe5a36db5ed94ea8f!2zQ8OzcmRvYmE!5e0!3m2!1ses!2ses!4v1714850000000!5m2!1ses!2ses"
                    width="100%" height="100%" style="border:0;" allowfullscreen="" loading="lazy" title="Mapa de Córdoba">
                </iframe>
            </div>
        </div>
    </main>

    <!-- NAV INFERIOR -->
    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-slate-200 z-50 flex justify-around items-center h-16 shadow-lg">
        <a href="index.html" class="flex flex-col items-center text-slate-400 text-xs gap-0.5"><i class="fa-solid fa-house text-lg"></i><span>Inicio</span></a>
        <a href="inventario.html" class="flex flex-col items-center text-slate-400 text-xs gap-0.5"><i class="fa-solid fa-box-open text-lg"></i><span>Inventario</span></a>
        <a href="recetas.html" class="flex flex-col items-center text-slate-400 text-xs gap-0.5"><i class="fa-solid fa-utensils text-lg"></i><span>Recetas</span></a>
        <a href="listas.html" class="flex flex-col items-center text-slate-400 text-xs gap-0.5"><i class="fa-solid fa-cart-shopping text-lg"></i><span>Lista</span></a>
        <a href="estadisticas.html" class="flex flex-col items-center text-slate-400 text-xs gap-0.5"><i class="fa-solid fa-chart-simple text-lg"></i><span>Stats</span></a>
    </nav>

    <script>
        function toggleMenu() {
            const menu = document.getElementById('mobile-menu');
            const icon = document.querySelector('#btn-hamburguesa i');
            menu.classList.toggle('open');
            icon.classList.toggle('fa-bars');
            icon.classList.toggle('fa-xmark');
        }
    </script>
<script>/* forzar-reflow */document.addEventListener("DOMContentLoaded",function(){document.body.style.display="none";void document.body.offsetHeight;document.body.style.display="";});</script>
</body>
</html>
