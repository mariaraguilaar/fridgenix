<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FRIDGENIX - Checkout Premium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-image: radial-gradient(circle at top right, #1e3a8a, #0f172a); }
    </style>
</head>
<body class="text-white min-h-screen flex flex-col">

    <!-- Header mínimo de regreso -->
    <div class="px-4 py-4 flex items-center">
        <a href="index.html" class="text-slate-400 hover:text-white text-sm flex items-center gap-2 min-h-[44px]">
            <i class="fa-solid fa-arrow-left"></i> Volver al inicio
        </a>
    </div>

    <!--
        DECISIÓN DE USABILIDAD:
        Esta página es ya de por sí single-column, así que los cambios principales son:
        - Padding lateral ajustado para móvil
        - Botón de pago con mayor altura (min-h-[60px]) — acción crítica, no debe pulsarse por error
        - Textos ligeramente reducidos para no desbordar pantallas pequeñas
    -->
    <main class="flex-grow flex items-start justify-center px-4 py-4 pb-10">
        <div class="bg-slate-800/80 backdrop-blur-md p-6 rounded-3xl shadow-2xl w-full max-w-sm border border-slate-700 text-center relative overflow-hidden">
            <div class="absolute -top-16 -left-16 w-40 h-40 bg-blue-500 rounded-full mix-blend-multiply filter blur-3xl opacity-50"></div>
            <div class="absolute -bottom-16 -right-16 w-40 h-40 bg-indigo-500 rounded-full mix-blend-multiply filter blur-3xl opacity-50"></div>

            <div class="relative z-10">
                <div class="text-5xl mb-4 text-yellow-400 drop-shadow-lg"><i class="fa-solid fa-crown"></i></div>
                <h1 class="text-2xl font-extrabold mb-2 tracking-tight">FRIDGENIX Premium</h1>
                <p class="text-slate-300 mb-6 text-sm font-medium">Estás a un paso de ahorrar hasta 50€ al mes en tu hogar, reduciendo el desperdicio al máximo.</p>

                <div class="bg-slate-900/50 p-5 rounded-2xl mb-6 border border-slate-600 text-left backdrop-blur-sm">
                    <div class="flex justify-between items-center mb-2">
                        <span class="text-slate-300 text-sm font-medium">Suscripción Mensual</span>
                        <span class="font-bold">2,99 €</span>
                    </div>
                    <div class="flex justify-between items-center text-xs text-slate-400 mb-3">
                        <span>Impuestos incluidos (IVA)</span>
                        <span>0,00 €</span>
                    </div>
                    <div class="w-full h-px bg-slate-600 mb-3"></div>
                    <div class="flex justify-between items-center text-xl font-black text-blue-400">
                        <span class="text-sm font-bold text-white">Total a pagar hoy</span>
                        <span>2,99 €</span>
                    </div>
                </div>

                <!-- Botón de pago: min-h alto porque es acción económica irreversible -->
                <button
                    onclick="alert('💳 ¡Pago completado! Ya disfrutas de todas las ventajas Premium.'); window.location.href='index.html';"
                    class="w-full bg-gradient-to-r from-blue-500 to-indigo-600 text-white font-bold py-4 rounded-xl hover:scale-105 transition-transform duration-300 mb-5 shadow-lg flex justify-center items-center gap-2 text-base min-h-[60px]">
                    <i class="fa-solid fa-lock text-sm opacity-80"></i> Pagar y Activar Premium
                </button>

                <a href="index.html" class="text-slate-400 hover:text-white underline text-sm transition-colors block">
                    Cancelar y volver de forma segura al inicio
                </a>
            </div>
        </div>
    </main>
<script>/* forzar-reflow */document.addEventListener("DOMContentLoaded",function(){document.body.style.display="none";void document.body.offsetHeight;document.body.style.display="";});</script>
</body>
</html>
